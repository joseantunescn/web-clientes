<div class="container mt-3">

  <div class="row justify-content-center">
    <div class="col-md-12">

      <div class="card shadow">
          <!-- Formulário -->
          <form [formGroup]="formulario" (ngSubmit)="consultar()">

            <div class="row mb-3">
              <div class="col-md-6">
                <input type="text" class="form-control" formControlName="nome" 
                  placeholder="Digite o nome do cliente desejado"/>
              </div>
              <div class="col-md-6">
                <input type="submit" class="btn btn-success" value="Pesquisar clientes"
                  [disabled]="formulario.invalid"/>
              </div>
            </div>

          </form>
        
        <!-- Cabeçalho -->
        <div class="card-header">
          <h5 class="mb-0">Consultar Clientes</h5>
        </div>

        <!-- Corpo -->
        <div class="card-body">

          <!-- Tabela -->
          <div class="table-responsive">
            <table class="table table-sm table-striped table-hover align-middle">
              
              <thead>
                <tr>
                  <th>Nome do Cliente</th>
                  <th>Email</th>
                  <th class="text-center" style="width: 180px;">Ações</th>
                </tr>
              </thead>

              <tbody>
                <!-- Exemplo de linha (Angular depois pode usar *ngFor) -->
                <tr>
                  <td>João da Silva</td>
                  <td>joao@email.com</td>
                  <td class="text-center">
                    <button class="btn btn-sm btn-warning me-2">
                      Editar
                    </button>
                    <button class="btn btn-sm btn-danger">
                      Excluir
                    </button>
                  </td>
                </tr>

                <tr>
                  <td>Maria Oliveira</td>
                  <td>maria@email.com</td>
                  <td class="text-center">
                    <button class="btn btn-sm btn-warning me-2">
                      Editar
                    </button>
                    <button class="btn btn-sm btn-danger">
                      Excluir
                    </button>
                  </td>
                </tr>

              </tbody>

            </table>
          </div>

        </div>

      </div>

    </div>
  </div>

</div>
